services:
  mysql:
    image: mysql:8.0
    container_name: empowernest_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: empowerNest
      MYSQL_USER: empoweruser
      MYSQL_PASSWORD: empowerpass123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./config/database.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - empowernest-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s

volumes:
  mysql_data:
    driver: local

networks:
  empowernest-network:
    driver: bridge
